# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "hash-lab"

[setup]
script = ""

[setup.win32]
script = '''
$ErrorActionPreference = "Stop"

if (-not $env:CODEX_WORKTREE_PATH) {
  Write-Error "CODEX_WORKTREE_PATH is not set."
  exit 1
}

Set-Location -LiteralPath $env:CODEX_WORKTREE_PATH
$env:PYTHONPATH = "src"

# Avoid the Codex automation proxy sink at 127.0.0.1:9.
foreach ($name in @("HTTP_PROXY", "HTTPS_PROXY", "ALL_PROXY", "http_proxy", "https_proxy", "all_proxy")) {
  Remove-Item -LiteralPath "Env:$name" -ErrorAction SilentlyContinue
  [Environment]::SetEnvironmentVariable($name, $null, "Process")
}

# Avoid Git for Windows schannel credential issues.
git config --global http.sslBackend openssl

# Preflight: GitHub CLI, git read/write, and Python runtime.
gh auth status -h github.com
gh repo view nana-nun/hash-lab --json nameWithOwner

git status --short
git -c http.proxy= -c https.proxy= -c http.sslBackend=openssl fetch origin

if (Test-Path -LiteralPath ".\.venv\Scripts\python.exe") {
  & ".\.venv\Scripts\python.exe" --version
} else {
  $runtimePython = Get-ChildItem -LiteralPath "$env:USERPROFILE\.cache\codex-runtimes" -Recurse -Filter python.exe -ErrorAction SilentlyContinue |
    Where-Object { $_.FullName -notmatch "WindowsApps" } |
    Select-Object -First 1

  if (-not $runtimePython) {
    Write-Error "No usable Python found under codex-runtimes."
    exit 1
  }

  & $runtimePython.FullName -m venv --without-pip .venv
  & ".\.venv\Scripts\python.exe" --version
}

$probe = ".codex-git-write-probe"
"probe" | Set-Content -Encoding ASCII -LiteralPath $probe
git add -- $probe
git reset -- $probe
Remove-Item -LiteralPath $probe -Force

git status --short
Write-Host "hash-lab automation environment is ready."
'''

[cleanup]
script = ""

[cleanup.win32]
script = '''
$ErrorActionPreference = "Continue"

if ($env:CODEX_WORKTREE_PATH) {
  Set-Location -LiteralPath $env:CODEX_WORKTREE_PATH
}

foreach ($name in @("HTTP_PROXY", "HTTPS_PROXY", "ALL_PROXY", "http_proxy", "https_proxy", "all_proxy")) {
  Remove-Item -LiteralPath "Env:$name" -ErrorAction SilentlyContinue
  [Environment]::SetEnvironmentVariable($name, $null, "Process")
}

Write-Host "Final git status:"
git status --short

Write-Host "Current branch:"
git branch --show-current

Remove-Item -LiteralPath ".codex-git-write-probe" -Force -ErrorAction SilentlyContinue
Remove-Item -LiteralPath ".pytest_cache" -Recurse -Force -ErrorAction SilentlyContinue
Remove-Item -LiteralPath "__pycache__" -Recurse -Force -ErrorAction SilentlyContinue

Write-Host "Cleanup completed. If git status is not clean, inspect before deleting the worktree."
'''
